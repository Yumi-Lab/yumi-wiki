name: Deploy Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdocs build

      - run: cp -r img site/img

      # Fix absolute /img/ paths for GitHub Pages subdirectory deployment
      - name: Fix image paths
        run: find site -name '*.html' -exec sed -i 's|="/img/|="/yumi-wiki/img/|g; s|(/img/|(/yumi-wiki/img/|g' {} +

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
