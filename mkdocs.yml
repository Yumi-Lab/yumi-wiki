site_name: YUMI-LAB documentation
site_url: https://wiki.yumi-lab.com
site_description: "Documentation for YUMI-LAB products: Smart Pi One, Yumi L Series Laser, Klipper Smart Pad, 3D Pen and more"
site_author: YUMI-LAB
copyright: "Copyright &copy; 2024-2026 YUMI-LAB"
repo_url: https://github.com/Yumi-Lab/yumi-wiki
repo_name: Yumi-Lab/yumi-wiki

# Website layout configuration (using mkdocs-material theme)
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: light blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
  logo: img/YUMI_LOGO.svg
  favicon: img/favicon.ico
  icon:
    repo: fontawesome/brands/github
    alternate: material/web
  features:
      - navigation.instant
      - navigation.instant.progress
      - navigation.tracking
      - navigation.top
      - navigation.footer
      - navigation.indexes
      - toc.follow
      - content.code.copy
      - content.tabs.link
      - search.suggest
      - search.highlight
      - search.share
  language: en
plugins:
  - search
  - glightbox
extra_css:
  - css/extra.css

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: Yumi-Lab
      repo: yumi-wiki
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

